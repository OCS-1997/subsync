name: Deploy RMS Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}

          script: |
            echo "Deploying RMS staging..."

            cd /var/www/rms-staging/subsync

            echo "Pulling latest code..."
            git pull origin main

            echo "Backend install..."
            cd backend
            npm install

            echo "Running ONLY migrations_new..."
            node ../server/runMigrationsNew.js

            echo "Frontend build..."
            cd ../subsync
            npm install
            npm run build

            echo "Deploy frontend dist..."
            rm -rf /var/www/rms-staging/dist
            mv dist /var/www/rms-staging/

            echo "Restart staging PM2..."
            pm2 restart ocs-staging-server

            echo "Deployment finished successfully.✅"
