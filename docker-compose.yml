services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
      - ./backup.sql:/docker-entrypoint-initdb.d/backup.sql
    ports:
      - "3307:3306"
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "${DB_USER}",
          "-p${DB_PASS}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DB_HOST: "db"
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: "redis"
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_PORT: 5173
      NODE_PORT: 3000
      HOME_IP: "localhost"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "pgrep node || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6378:6379"
    restart: unless-stopped

  frontend:
    build:
      context: ./subsync
      dockerfile: Dockerfile
      args:
        # Update this to your VPS IP or domain before deploying! e.g. http://YOUR_VPS_IP:3000/api
        VITE_API_URL: http://localhost:3000/api/
    ports:
      - "80:80"
    environment:
      NGINX_HOST: 0.0.0.0
    volumes:
      # Mount APK folder: place subsync.apk in /var/www/downloads on your VPS
      # Accessible at: http://YOUR_VPS_IP/download/app
      - /var/www/downloads:/downloads:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
