server {
    listen 80;

    # dev -> server_name localhost; deployed -> domain name
    server_name localhost;

    # Root directory where your built React app is
    root /usr/share/nginx/html;

    # Default files to serve for a directory
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy — forward /api requests to Node.js
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # Bull Board (queue monitoring) — proxy
    location /admin/queues {
        proxy_pass http://backend:3000/admin/queues;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # APK Download endpoint — serves the Android APK file
    # Upload APK to /var/www/downloads/subsync.apk on the VPS
    # then mount it in docker-compose as /downloads
    location /download/app {
        alias /downloads/;
        add_header Content-Disposition 'attachment; filename="Subsync.apk"';
        add_header Content-Type application/vnd.android.package-archive;
        try_files /subsync.apk =404;
    }

    # Gzip compression for better performance (recommended)
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    error_log /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log combined;
}
